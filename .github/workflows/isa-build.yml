---
name: RISC-V ISA Build

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: Create a new RISC-V ISA release if set to true
        required: false
        default: 'false'
      target_branch:
        description: Target Branch
        required: true
        default: main
      release_notes:
        description: Release Notes
        required: false
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/riscv/riscv-docs-base-container-image:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Set short SHA
        run: echo "SHORT_SHA=$(echo ${GITHUB_SHA::7})" >> $GITHUB_ENV

      - name: Get current date
        run: echo "CURRENT_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Build PDF
        id: build_files
        run: make pdf

      - name: Upload Zvame PDF
        if: steps.build_files.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: Zvame-0.1-${{ env.SHORT_SHA }}.pdf
          path: ${{ github.workspace }}/build/Zvame-0.1.pdf
          retention-days: 7

      - name: Create Release
        if: steps.build_files.outcome == 'success' && github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          draft: false
          tag_name: riscv-isa-release-${{ env.SHORT_SHA }}-${{ env.CURRENT_DATE }}
          name: ${{ env.CURRENT_DATE }}
          body: |
            This release was created by: ${{ github.event.sender.login }}
            Release Notes: ${{ github.event.inputs.release_notes }}
          files: |
            ${{ github.workspace }}/build/Zvame-0.1.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GHTOKEN }}
