<?xml version="1.0" encoding="UTF-8"?>
<svg width="1030" height="370" viewBox="0 0 1030 370" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
    <marker id="arr-l" viewBox="0 0 10 10" refX="0" refY="5"
            markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#1e1e1e"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1e1e"/>
    </marker>
  </defs>

  <rect width="1030" height="370" fill="white"/>

  <!-- Row geometry (shared by all register files):
       Row 0:    y=90–155  (h=65), mid y=122
       Row 1:    y=155–220 (h=65), mid y=187
       Ellipsis: y=220–252 (h=32)
       Row N-1:  y=252–317 (h=65), mid y=284
       Connecting lines hit the vertical midpoint of each row. -->

  <!-- ═══════════════════════════════════════════════
       M register file   x: 55–310  (width 255)
       ═══════════════════════════════════════════════ -->

  <text x="182" y="44" text-anchor="middle" font-size="30" font-weight="bold" fill="#1e1e1e">M</text>
  <text x="182" y="66" text-anchor="middle" font-size="15" fill="#555555">matrix registers</text>

  <rect x="55" y="90" width="255" height="65" fill="none" stroke="#1e1e1e" stroke-width="2"/>
  <text x="182" y="130" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e1e1e">M[0]</text>

  <rect x="55" y="155" width="255" height="65" fill="none" stroke="#1e1e1e" stroke-width="2"/>
  <text x="182" y="195" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e1e1e">M[1]</text>

  <rect x="55" y="220" width="255" height="32" fill="#e8e8e8" stroke="#1e1e1e" stroke-width="2"/>
  <text x="182" y="242" text-anchor="middle" font-size="20" fill="#1e1e1e">...</text>

  <rect x="55" y="252" width="255" height="65" fill="none" stroke="#1e1e1e" stroke-width="2"/>
  <text x="182" y="292" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e1e1e">M[N-1]</text>

  <!-- M width dimension -->
  <line x1="55" y1="334" x2="310" y2="334" stroke="#1e1e1e" stroke-width="1.5"
        marker-start="url(#arr-l)" marker-end="url(#arr-r)"/>
  <text x="182" y="351" text-anchor="middle" font-size="13" fill="#1e1e1e">AME_UNIT_DATATYPE_SIZE × AME_NELEM bits</text>

  <!-- ═══════════════════════════════════════════════
       Md register file  x: 360–470  (width 110)
       ═══════════════════════════════════════════════ -->

  <text x="415" y="44" text-anchor="middle" font-size="30" font-weight="bold" fill="#1e1e1e">Md</text>
  <text x="415" y="66" text-anchor="middle" font-size="15" fill="#555555">matrix datatype</text>

  <!-- Md[0] -->
  <rect x="360" y="90" width="110" height="65" fill="none" stroke="#1e1e1e" stroke-width="2"/>
  <text x="415" y="130" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e1e1e">Md[0]</text>

  <!-- Md[1] -->
  <rect x="360" y="155" width="110" height="65" fill="none" stroke="#1e1e1e" stroke-width="2"/>
  <text x="415" y="195" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e1e1e">Md[1]</text>

  <!-- Md ellipsis -->
  <rect x="360" y="220" width="110" height="32" fill="#e8e8e8" stroke="#1e1e1e" stroke-width="2"/>
  <text x="415" y="242" text-anchor="middle" font-size="20" fill="#1e1e1e">...</text>

  <!-- Md[N-1] -->
  <rect x="360" y="252" width="110" height="65" fill="none" stroke="#1e1e1e" stroke-width="2"/>
  <text x="415" y="292" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e1e1e">Md[N-1]</text>

  <!-- Md width dimension -->
  <line x1="360" y1="334" x2="470" y2="334" stroke="#1e1e1e" stroke-width="1.5"
        marker-start="url(#arr-l)" marker-end="url(#arr-r)"/>
  <text x="415" y="351" text-anchor="middle" font-size="13" fill="#1e1e1e">32 bits</text>

  <!-- Connecting lines M[i] ↔ Md[i]; lines hit Md name section (above internal divider) -->
  <line x1="310" y1="122" x2="360" y2="122" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="310" y1="187" x2="360" y2="187" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="310" y1="284" x2="360" y2="284" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="335" y="110" text-anchor="middle" font-size="11" font-style="italic" fill="#777777">same index</text>

  <!-- M / Md group count (rotated, left of M) -->
  <!-- cy = (90+317)/2 = 203.5; register file spans y=90–317 -->
  <text transform="translate(30, 204) rotate(-90)" text-anchor="middle"
        font-size="13" fill="#1e1e1e">N = AME_NUM_M_REGS (16 or 32)</text>
  <line x1="44" y1="90" x2="44" y2="317" stroke="#1e1e1e" stroke-width="1.5"
        marker-start="url(#arr-l)" marker-end="url(#arr-r)"/>

  <!-- ═══════════════════════════════════════════════
       Acc register file  x: 595–850  (width 255)  [shifted +60 from Md group]
       ═══════════════════════════════════════════════ -->

  <text x="722" y="44" text-anchor="middle" font-size="30" font-weight="bold" fill="#1e1e1e">Acc</text>
  <text x="722" y="66" text-anchor="middle" font-size="15" fill="#555555">accumulator registers</text>

  <rect x="595" y="90" width="255" height="65" fill="none" stroke="#1e1e1e" stroke-width="2"/>
  <text x="722" y="130" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e1e1e">Acc[0]</text>

  <rect x="595" y="155" width="255" height="65" fill="none" stroke="#1e1e1e" stroke-width="2"/>
  <text x="722" y="195" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e1e1e">Acc[1]</text>

  <rect x="595" y="220" width="255" height="32" fill="#e8e8e8" stroke="#1e1e1e" stroke-width="2"/>
  <text x="722" y="242" text-anchor="middle" font-size="20" fill="#1e1e1e">...</text>

  <rect x="595" y="252" width="255" height="65" fill="none" stroke="#1e1e1e" stroke-width="2"/>
  <text x="722" y="292" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e1e1e">Acc[N-1]</text>

  <!-- Acc width dimension -->
  <line x1="595" y1="334" x2="850" y2="334" stroke="#1e1e1e" stroke-width="1.5"
        marker-start="url(#arr-l)" marker-end="url(#arr-r)"/>
  <text x="722" y="351" text-anchor="middle" font-size="13" fill="#1e1e1e">AME_MAX_DATATYPE_SIZE × AME_NELEM bits</text>

  <!-- ═══════════════════════════════════════════════
       Ad register file  x: 900–995  (width 95)
       ═══════════════════════════════════════════════ -->

  <text x="947" y="44" text-anchor="middle" font-size="30" font-weight="bold" fill="#1e1e1e">Ad</text>
  <text x="947" y="60" text-anchor="middle" font-size="15" fill="#555555">accumulator</text>
  <text x="947" y="76" text-anchor="middle" font-size="15" fill="#555555">datatype</text>

  <rect x="900" y="90" width="95" height="65" fill="none" stroke="#1e1e1e" stroke-width="2"/>
  <text x="947" y="130" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e1e1e">Ad[0]</text>

  <rect x="900" y="155" width="95" height="65" fill="none" stroke="#1e1e1e" stroke-width="2"/>
  <text x="947" y="195" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e1e1e">Ad[1]</text>

  <rect x="900" y="220" width="95" height="32" fill="#e8e8e8" stroke="#1e1e1e" stroke-width="2"/>
  <text x="947" y="242" text-anchor="middle" font-size="20" fill="#1e1e1e">...</text>

  <rect x="900" y="252" width="95" height="65" fill="none" stroke="#1e1e1e" stroke-width="2"/>
  <text x="947" y="292" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e1e1e">Ad[N-1]</text>

  <!-- Ad width dimension -->
  <line x1="900" y1="334" x2="995" y2="334" stroke="#1e1e1e" stroke-width="1.5"
        marker-start="url(#arr-l)" marker-end="url(#arr-r)"/>
  <text x="947" y="351" text-anchor="middle" font-size="13" fill="#1e1e1e">32 bits</text>

  <!-- Connecting lines Acc[i] ↔ Ad[i] (same index i) -->
  <line x1="850" y1="122" x2="900" y2="122" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="850" y1="187" x2="900" y2="187" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="850" y1="284" x2="900" y2="284" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="875" y="110" text-anchor="middle" font-size="11" font-style="italic" fill="#777777">same index</text>

  <!-- Acc / Ad group count (rotated, left of Acc) -->
  <text transform="translate(570, 204) rotate(-90)" text-anchor="middle"
        font-size="13" fill="#1e1e1e">N = AME_NUM_ACC_REGS (1, 2, or 4)</text>
  <line x1="584" y1="90" x2="584" y2="317" stroke="#1e1e1e" stroke-width="1.5"
        marker-start="url(#arr-l)" marker-end="url(#arr-r)"/>

</svg>
