<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="640" viewBox="0 0 1600 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: Arial, sans-serif; }
      .label { font-size: 28px; }
    </style>
  </defs>

  <!-- White background -->
  <rect width="1600" height="640" fill="white"/>

  <!-- Memory box (external, top-left, above M) -->
  <rect x="100" y="15" width="230" height="80" fill="none" stroke="#1e1e1e" stroke-width="2"/>
  <text x="215" y="63" text-anchor="middle" class="label" fill="#1e1e1e">Memory</text>

  <!-- RISC-V Hart boundary (large dashed) -->
  <rect x="30" y="130" width="1540" height="470" fill="none" stroke="#1e1e1e" stroke-width="4" stroke-dasharray="8,10" rx="4"/>
  <text x="800" y="584" text-anchor="middle" font-size="24px" fill="#1e1e1e">RISC-V Hart</text>

  <!-- AME State region (inner dashed) -->
  <rect x="60" y="175" width="580" height="360" fill="none" stroke="#1e1e1e" stroke-width="3" stroke-dasharray="6,8" rx="4"/>
  <text x="350" y="521" text-anchor="middle" font-size="22px" fill="#1e1e1e">AME State</text>

  <!-- M registers box -->
  <rect x="90" y="230" width="250" height="250" fill="none" stroke="#1e1e1e" stroke-width="2"/>
  <text x="215" y="330" text-anchor="middle" class="label" fill="#1e1e1e">M</text>
  <text x="215" y="360" text-anchor="middle" font-size="20px" fill="#1e1e1e">(matrix)</text>
  <text x="215" y="390" text-anchor="middle" font-size="18px" fill="#888888">M0–M31</text>

  <!-- Acc registers box -->
  <rect x="390" y="230" width="220" height="250" fill="none" stroke="#1e1e1e" stroke-width="2"/>
  <text x="500" y="330" text-anchor="middle" class="label" fill="#1e1e1e">Acc</text>
  <text x="500" y="360" text-anchor="middle" font-size="20px" fill="#1e1e1e">(accumulator)</text>
  <text x="500" y="390" text-anchor="middle" font-size="18px" fill="#888888">Acc0–Acc3</text>

  <!-- X (integer) register file -->
  <rect x="730" y="215" width="250" height="200" fill="none" stroke="#1e1e1e" stroke-width="2"/>
  <text x="855" y="305" text-anchor="middle" class="label" fill="#1e1e1e">X</text>
  <text x="855" y="335" text-anchor="middle" font-size="20px" fill="#1e1e1e">(integer)</text>
  <text x="855" y="365" text-anchor="middle" font-size="18px" fill="#888888">X0–X31</text>

  <!-- F/D (float) register file (optional, dashed, gray) -->
  <rect x="1055" y="215" width="240" height="200" fill="none" stroke="#aaaaaa" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="1175" y="305" text-anchor="middle" class="label" fill="#aaaaaa">F/D</text>
  <text x="1175" y="335" text-anchor="middle" font-size="20px" fill="#aaaaaa">(float)</text>
  <text x="1175" y="368" text-anchor="middle" font-size="18px" fill="#aaaaaa">optional</text>

  <!-- V (vector) register file (optional, dashed, gray) -->
  <rect x="1370" y="215" width="170" height="200" fill="none" stroke="#aaaaaa" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="1455" y="305" text-anchor="middle" class="label" fill="#aaaaaa">V</text>
  <text x="1455" y="332" text-anchor="middle" font-size="17px" fill="#aaaaaa">(RISC-V Vector)</text>
  <text x="1455" y="360" text-anchor="middle" font-size="18px" fill="#aaaaaa">optional</text>

  <!-- ARROWS -->

  <!-- Memory ↔ M: bidirectional vertical arrows -->
  <!-- Down: Memory → M -->
  <line x1="205" y1="95" x2="205" y2="230" stroke="#1e1e1e" stroke-width="3"/>
  <polygon points="205,230 198,215 212,215" fill="#1e1e1e"/>
  <!-- Up: M → Memory -->
  <line x1="230" y1="230" x2="230" y2="95" stroke="#1e1e1e" stroke-width="3"/>
  <polygon points="230,95 223,110 237,110" fill="#1e1e1e"/>

  <!-- M ↔ Acc: bidirectional horizontal (internal to AME State) -->
  <!-- Right: M → Acc -->
  <line x1="340" y1="345" x2="390" y2="345" stroke="#1e1e1e" stroke-width="3"/>
  <polygon points="390,345 375,338 375,352" fill="#1e1e1e"/>
  <!-- Left: Acc → M -->
  <line x1="390" y1="368" x2="340" y2="368" stroke="#1e1e1e" stroke-width="3"/>
  <polygon points="340,368 355,361 355,375" fill="#1e1e1e"/>

  <!-- X → M: one-way scalar-to-matrix arrow (solid) -->
  <line x1="730" y1="315" x2="340" y2="315" stroke="#1e1e1e" stroke-width="3"/>
  <polygon points="340,315 355,308 355,322" fill="#1e1e1e"/>

  <!-- F/D → M: optional scalar-to-matrix arrow (dashed gray), routed below all boxes -->
  <path d="M 1175,415 L 1175,500 L 340,500 L 340,450" fill="none" stroke="#aaaaaa" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="340,450 333,465 347,465" fill="#aaaaaa"/>

</svg>
