<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 235" font-family="'Segoe UI', Arial, sans-serif">

  <rect width="640" height="235" fill="white"/>

  <!-- ====== MATRIX A (8×8) ====== -->
  <!-- Origin: (20, 60), cell size=20, matrix 160×160 -->

  <text x="20" y="52" font-size="12" font-weight="bold" fill="#333">A_square (8×8)</text>

  <!-- Zero padding background -->
  <rect x="20" y="60" width="160" height="160" fill="#F2F3F4"/>
  <!-- A data region: rows 0-2, cols 0-4 → x:20-120, y:60-120 -->
  <rect x="20" y="60" width="100" height="60" fill="#AED6F1"/>

  <!-- Grid lines -->
  <g stroke="#C0C0C0" stroke-width="0.5">
    <line x1="20" y1="60"  x2="180" y2="60"/>
    <line x1="20" y1="80"  x2="180" y2="80"/>
    <line x1="20" y1="100" x2="180" y2="100"/>
    <line x1="20" y1="120" x2="180" y2="120"/>
    <line x1="20" y1="140" x2="180" y2="140"/>
    <line x1="20" y1="160" x2="180" y2="160"/>
    <line x1="20" y1="180" x2="180" y2="180"/>
    <line x1="20" y1="200" x2="180" y2="200"/>
    <line x1="20" y1="220" x2="180" y2="220"/>
    <line x1="20"  y1="60" x2="20"  y2="220"/>
    <line x1="40"  y1="60" x2="40"  y2="220"/>
    <line x1="60"  y1="60" x2="60"  y2="220"/>
    <line x1="80"  y1="60" x2="80"  y2="220"/>
    <line x1="100" y1="60" x2="100" y2="220"/>
    <line x1="120" y1="60" x2="120" y2="220"/>
    <line x1="140" y1="60" x2="140" y2="220"/>
    <line x1="160" y1="60" x2="160" y2="220"/>
    <line x1="180" y1="60" x2="180" y2="220"/>
  </g>

  <!-- Outer border -->
  <rect x="20" y="60" width="160" height="160" fill="none" stroke="#555" stroke-width="1.5"/>
  <!-- A data region border -->
  <rect x="20" y="60" width="100" height="60" fill="none" stroke="#2471A3" stroke-width="1.5"/>

  <text x="70"  y="90"  text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="bold" fill="#1A5276">A</text>
  <text x="150" y="90"  text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#AAAAAA">0</text>
  <text x="100" y="170" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#AAAAAA">0</text>


  <!-- ====== OPERATOR × ====== -->
  <!-- centered between A (right=180) and B (left=240): x=210 -->
  <text x="210" y="140" text-anchor="middle" dominant-baseline="middle" font-size="22" fill="#444">×</text>


  <!-- ====== MATRIX B (8×8) ====== -->
  <!-- Origin: (240, 60) -->

  <text x="240" y="52" font-size="12" font-weight="bold" fill="#333">B_square (8×8)</text>

  <rect x="240" y="60" width="160" height="160" fill="#F2F3F4"/>
  <!-- B data region: rows 0-4, cols 0-1 → x:240-280, y:60-160 -->
  <rect x="240" y="60" width="40" height="100" fill="#ABEBC6"/>

  <g stroke="#C0C0C0" stroke-width="0.5">
    <line x1="240" y1="60"  x2="400" y2="60"/>
    <line x1="240" y1="80"  x2="400" y2="80"/>
    <line x1="240" y1="100" x2="400" y2="100"/>
    <line x1="240" y1="120" x2="400" y2="120"/>
    <line x1="240" y1="140" x2="400" y2="140"/>
    <line x1="240" y1="160" x2="400" y2="160"/>
    <line x1="240" y1="180" x2="400" y2="180"/>
    <line x1="240" y1="200" x2="400" y2="200"/>
    <line x1="240" y1="220" x2="400" y2="220"/>
    <line x1="240" y1="60" x2="240" y2="220"/>
    <line x1="260" y1="60" x2="260" y2="220"/>
    <line x1="280" y1="60" x2="280" y2="220"/>
    <line x1="300" y1="60" x2="300" y2="220"/>
    <line x1="320" y1="60" x2="320" y2="220"/>
    <line x1="340" y1="60" x2="340" y2="220"/>
    <line x1="360" y1="60" x2="360" y2="220"/>
    <line x1="380" y1="60" x2="380" y2="220"/>
    <line x1="400" y1="60" x2="400" y2="220"/>
  </g>

  <rect x="240" y="60" width="160" height="160" fill="none" stroke="#555" stroke-width="1.5"/>
  <rect x="240" y="60" width="40"  height="100" fill="none" stroke="#1E8449" stroke-width="1.5"/>

  <text x="260" y="110" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="bold" fill="#145A32">B</text>
  <text x="340" y="90"  text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#AAAAAA">0</text>
  <text x="320" y="190" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#AAAAAA">0</text>


  <!-- ====== OPERATOR = ====== -->
  <!-- centered between B (right=400) and C (left=460): x=430 -->
  <text x="430" y="140" text-anchor="middle" dominant-baseline="middle" font-size="22" fill="#444">=</text>


  <!-- ====== MATRIX C (8×8) ====== -->
  <!-- Origin: (460, 60) -->

  <text x="460" y="52" font-size="12" font-weight="bold" fill="#333">C_square (8×8)</text>

  <!-- Discarded output background -->
  <rect x="460" y="60" width="160" height="160" fill="#D7DBDD"/>
  <!-- C valid output: rows 0-2, cols 0-1 → x:460-500, y:60-120 -->
  <rect x="460" y="60" width="40" height="60" fill="#FAD7A0"/>

  <g stroke="#C0C0C0" stroke-width="0.5">
    <line x1="460" y1="60"  x2="620" y2="60"/>
    <line x1="460" y1="80"  x2="620" y2="80"/>
    <line x1="460" y1="100" x2="620" y2="100"/>
    <line x1="460" y1="120" x2="620" y2="120"/>
    <line x1="460" y1="140" x2="620" y2="140"/>
    <line x1="460" y1="160" x2="620" y2="160"/>
    <line x1="460" y1="180" x2="620" y2="180"/>
    <line x1="460" y1="200" x2="620" y2="200"/>
    <line x1="460" y1="220" x2="620" y2="220"/>
    <line x1="460" y1="60" x2="460" y2="220"/>
    <line x1="480" y1="60" x2="480" y2="220"/>
    <line x1="500" y1="60" x2="500" y2="220"/>
    <line x1="520" y1="60" x2="520" y2="220"/>
    <line x1="540" y1="60" x2="540" y2="220"/>
    <line x1="560" y1="60" x2="560" y2="220"/>
    <line x1="580" y1="60" x2="580" y2="220"/>
    <line x1="600" y1="60" x2="600" y2="220"/>
    <line x1="620" y1="60" x2="620" y2="220"/>
  </g>

  <rect x="460" y="60" width="160" height="160" fill="none" stroke="#555" stroke-width="1.5"/>
  <rect x="460" y="60" width="40"  height="60"  fill="none" stroke="#B7950B" stroke-width="2"/>

  <text x="480" y="90"  text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="bold" fill="#7E5109">C</text>
  <text x="545" y="145" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#888">discard</text>

</svg>
